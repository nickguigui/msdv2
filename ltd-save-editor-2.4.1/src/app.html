<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <meta name="theme-color" content="#EA580C" />
    <script>
      (function () {
        var legacy = {
          'ltd-save-editor.pages.dev': 'https://ltdsave.app',
          'beta.ltd-save-editor.pages.dev': 'https://beta.ltdsave.app',
        };
        var target = legacy[location.hostname];
        if (target && !location.pathname.startsWith('/history')) {
          location.replace(target + location.pathname + location.search + location.hash);
        }
      })();
      try {
        if (localStorage.getItem('ltd-save-editor:theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app">%sveltekit.body%</div>
    <script
      defer
      src="https://stats.alexislours.com/script.js"
      data-performance="true"
      data-website-id="%sveltekit.env.PUBLIC_UMAMI_WEBSITE_ID%"
      data-domains="%sveltekit.env.PUBLIC_UMAMI_DOMAIN%"
    ></script>
  </body>
</html>
