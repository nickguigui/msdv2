<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF & Design Studio - TomoConvert Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --pk:#FF4FA3;--yw:#FFD93D;--cy:#00E5FF;
  --pu:#9B59FF;--gn:#39FF7E;--or:#FF6B35;
  --dk:#0A0A12;--dk3:#1A1A2E;
  --ca:#16162A;--bo:rgba(255,255,255,0.09);
  --tx:#F0EEFF;--mu:rgba(240,238,255,0.46);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--dk);color:var(--tx);
  font-family:'Fredoka',sans-serif;font-size:16px;
  min-height:100vh;overflow-x:hidden;
}
header{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:16px 22px 12px;border-bottom:1px solid var(--bo);
  background: var(--dk);
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(18px,3.5vw,26px);letter-spacing:-.8px;
  background:linear-gradient(135deg,var(--pk),var(--pu),var(--cy));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.lpill{
  background:linear-gradient(135deg,var(--pk),var(--pu));
  color:#fff;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:1.5px;padding:3px 9px;border-radius:20px;
}
.hdr{margin-left:auto;font-family:'Space Mono',monospace;font-size:9px;color:var(--mu);}
#nav{
  display:flex;gap:3px;flex-wrap:wrap;padding:10px 22px 0;
  background:rgba(10,10,18,.97);border-bottom:2px solid var(--bo);
  position:sticky;top:0;z-index:99;
}
.nb{
  text-decoration: none;
  background:none;border:1.5px solid transparent;color:var(--mu);
  font-family:'Fredoka',sans-serif;font-size:14px;font-weight:500;
  padding:7px 14px;border-radius:10px 10px 0 0;cursor:pointer;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:color .15s,background .15s;
}
.nb:hover{color:var(--tx);background:rgba(255,255,255,.05);}
.nb.on{
  color:var(--tx);background:var(--ca);
  border-color:var(--pu);border-bottom-color:var(--ca);
  position:relative;bottom:-2px;
}
.pn{padding:22px; max-width: 1400px; margin: 0 auto;}
.sh{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(20px,4vw,32px);line-height:1.1;margin-bottom:4px;}
.ss{font-family:'Space Mono',monospace;font-size:10px;color:var(--mu);margin-bottom:22px;}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="logo">🌴 TomoConvert</span>
    <span class="lpill">STUDIO</span>
  </div>
  <div class="hdr">conversor · save editor · IA · pdf</div>
</header>

<nav id="nav">
  <a href="index.html" class="nb">🏠 Início</a>
  <a href="convert.html" class="nb">🔄 Conversor</a>
  <a href="save.html" class="nb">💾 Save Editor</a>
  <a href="pdf.html" class="nb on">📄 PDF Studio</a>
</nav>

<section class="pn">
  <div class="sh" style="background:linear-gradient(135deg,var(--pk),var(--cy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Design & PDF Studio</div>
  <div class="ss">// Edição visual avançada (Powered by Photopea)</div>

  <div style="width: 100%; height: 80vh; min-height: 700px; border-radius: 12px; overflow: hidden; border: 1px solid var(--bo);">
    <iframe src="https://www.photopea.com/" style="width:100%; height:100%; border:none;"></iframe>
  </div>

  <p style="font-size: 12px; color: var(--mu); text-align: center; margin-top: 14px;">
    Arraste qualquer PDF, PSD ou Imagem para dentro do editor acima. Todas as edições ocorrem localmente no seu navegador.
  </p>
</section>

</body>
</html>
